name: build (Raspberry Pi)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build (linux/arm64 only)
        run: |
          make generate
          mkdir -p build
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o build/picoclaw-linux-arm64 ./cmd/picoclaw

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-linux-arm64
          path: build/picoclaw-linux-arm64
